theme: jekyll-theme-chirpy

lang: en
timezone: Europe/London

title: The proof is trivial
tagline: C++, systems programming, and boardgames

description: >-
  A blog by Gareth Lloyd. Senior Software Engineer at Memgraph,
  ACCU York coordinator. C++, Rust, HPC, lock-free programming.

url: "https://ignition.github.io"

github:
  username: ignition

social:
  name: Gareth Lloyd
  fediverse_handle: "@glloyd@fosstodon.org"
  links:
    - https://github.com/ignition
    - https://fosstodon.org/@glloyd
    - https://boardgamegeek.com/user/thth

avatar: /assets/img/avatar.jpg

# Leave empty to follow system preference with toggle in sidebar
theme_mode:

toc: true

comments:
  provider:

pwa:
  enabled: true
  cache:
    enabled: true

paginate: 10

baseurl: ""

# ------------ Below not recommended to modify ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
